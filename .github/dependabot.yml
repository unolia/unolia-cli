version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Paris"
    cooldown:
      default-days: 5
    labels:
      - "dependencies"
      - "ci"
    groups:
      github-actions-patch:
        patterns:
          - "*"
        update-types:
          - "patch"
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "major"

  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Paris"
    cooldown:
      default-days: 5
    labels:
      - "dependencies"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    groups:
      composer-patch:
        patterns:
          - "*"
        update-types:
          - "patch"
      composer-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
