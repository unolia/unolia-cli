name: Dependabot auto-merge

# Auto-merges Dependabot PATCH update PRs once required CI checks pass.
# Minor/major PRs are left open for manual review. Uses pull_request_target
# so it runs with a write token on Dependabot PRs; it never checks out the
# PR's code, so untrusted code is never executed.
on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: ${{ github.event.pull_request.user.login == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch updates
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-patch' }}
        run: gh pr merge --squash --auto "$PR_URL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
