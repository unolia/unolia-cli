name: Tests

on:
  pull_request: ~
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        php: [8.2, 8.3, 8.4, 8.5]

    name: Test with php ${{ matrix.php }} on ${{ matrix.os }}


    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: xdebug

      - name: Get composer cache directory
        id: composer-cache
        shell: bash
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Dependencies
        run: composer update -W --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Run tests
        run: composer test

      - name: Test cpx execution
        if: matrix.php == '8.4' && matrix.os == 'ubuntu-latest'
        run: |
          composer global require cpx/cpx --no-interaction --prefer-dist
          export PATH="$COMPOSER_HOME/vendor/bin:$PATH"
          cpx unolia/unolia-cli:dev-${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}} --version
